# 推送到 main 后构建并部署到 GitHub Pages（含 public 下的 bgm.mp3 / all-bgm.mp3）
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: List build output (for debugging)
        run: ls -la dist/public/

      - name: Verify BGM files in build
        run: |
          test -f dist/public/bgm.mp3 && echo "✓ bgm.mp3 present" || (echo "✗ bgm.mp3 missing"; exit 1)
          test -f dist/public/all-bgm.mp3 && echo "✓ all-bgm.mp3 present" || (echo "✗ all-bgm.mp3 missing"; exit 1)

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
